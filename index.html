<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi App Pro</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
        }

        header {
            padding: 40px;
            font-size: 40px;
            font-weight: bold;
        }

        .card {
            background: white;
            color: black;
            width: 300px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #2a5298;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #1e3c72;
        }
    </style>
</head>
<body>

<header>🚀 Mi Primera App Profesional</header>

<div class="card">
    <h2>Bienvenido</h2>
    <p>Esta es una app moderna hecha en HTML y CSS.</p>
    <button onclick="mostrarMensaje()">Haz clic</button>
</div>

<script>
    function mostrarMensaje() {
        alert("🔥 ¡Ya estás creando apps profesionales!");
    }
</script>

</body>
</html>
